spring.application.name=techtagger-backend
server.port=8080

# MySQL (rodando via Docker na porta 3307)
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/techtagger?useSSL=false&serverTimezone=UTC
spring.datasource.username=techtagger_user
spring.datasource.password=${DB_PASSWORD:techtagger_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA ? com Flyway, o Hibernate so VALIDA o schema, nao cria/altera
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# URL da ML API (FastAPI do time de dados)
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# Mudana onde o Swagger aparece (padro: /swagger-ui.html)
springdoc.swagger-ui.path=/docs

# Mudana onde fica o JSON da especificao (padro: /v3/api-docs)
springdoc.api-docs.path=/api-docs

# Logging
logging.level.root=INFO
logging.level.com.techtagger.backend=DEBUG
logging.level.org.springframework.web.reactive.function.client=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n